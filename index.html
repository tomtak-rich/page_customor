<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>철거의정석 · 고객/현장 관리 대시보드</title>
<meta name="description" content="철거의정석 내부 전용 고객·현장 관리 대시보드 (견적→완료 카테고리 + 알림톡 10단계)" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#0E1733; --panel:#1A2A57; --panel-2:#243B73;
    --brand:#304CFE; --gold:#E9B949; --text:#FFFFFF; --muted:#AEBEEA;
    --border:rgba(174,190,234,.16); --border-strong:rgba(174,190,234,.28);
    --shadow:0 8px 28px rgba(0,0,0,.28); --radius:14px; --radius-sm:10px;
    --ok:#3DD68C; --warn:#E9B949; --danger:#F2617A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;}
  h1,h2,h3,h4{margin:0;letter-spacing:-0.02em;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:rgba(48,76,254,.4);}

  .topbar{position:sticky;top:0;z-index:50;background:rgba(14,23,51,.9);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);}
  .topbar-in{max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;white-space:nowrap;cursor:pointer;}
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px rgba(48,76,254,.18);}
  .logo small{font-weight:600;color:var(--muted);font-size:12.5px;margin-left:2px;}
  .spacer{flex:1;}

  .btn{border:1px solid var(--border-strong);background:var(--panel);color:#fff;
    padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.15s;white-space:nowrap;}
  .btn:hover{background:var(--panel-2);}
  .btn.primary{background:var(--brand);border-color:var(--brand);}
  .btn.primary:hover{filter:brightness(1.1);}
  .btn.ghost{background:transparent;}
  .btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px;}
  .btn.danger{color:var(--danger);border-color:rgba(242,97,122,.4);}
  .btn.danger:hover{background:rgba(242,97,122,.12);}

  .wrap{max-width:1280px;margin:0 auto;padding:24px;}

  /* 상단 요약 */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
  .stat .lbl{font-size:12.5px;color:var(--muted);font-weight:600;}
  .stat .val{font-size:30px;font-weight:800;margin-top:6px;line-height:1;}
  .stat.wait .val{color:var(--gold);}
  .stat.done .val{color:var(--ok);}

  /* 카테고리 보드 */
  .sec-title{font-size:15px;font-weight:800;margin:6px 2px 14px;color:#fff;}
  .cats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .cat{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px 18px;box-shadow:var(--shadow);text-align:left;transition:.15s;position:relative;overflow:hidden;min-height:150px;
    display:flex;flex-direction:column;}
  .cat:hover{background:var(--panel-2);transform:translateY(-2px);border-color:var(--border-strong);}
  .cat .bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brand);}
  .cat.c-estimate .bar{background:#6E8BFF;}
  .cat.c-bidding .bar{background:var(--gold);}
  .cat.c-construction .bar{background:var(--brand);}
  .cat.c-done .bar{background:var(--ok);}
  .cat.c-closure .bar{background:#C792FF;}
  .cat .ct{font-size:15px;font-weight:800;}
  .cat .cd{font-size:12px;color:var(--muted);margin-top:4px;flex:1;}
  .cat .cn{font-size:34px;font-weight:800;margin-top:12px;line-height:1;}
  .cat .cu{font-size:12px;color:var(--muted);margin-top:4px;}
  .cat .wait-tag{display:inline-block;margin-top:8px;font-size:11.5px;font-weight:700;color:#3a2e00;
    background:var(--gold);border-radius:999px;padding:3px 9px;}

  /* 리스트 헤더 */
  .listhead{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .listhead .ht{font-size:20px;font-weight:800;}
  .listhead .hsub{font-size:13px;color:var(--muted);}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .field{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:9px 12px;color:#fff;font-size:13.5px;outline:none;}
  .field:focus{border-color:var(--brand);}
  input.field::placeholder{color:rgba(174,190,234,.6);}
  select.field{cursor:pointer;}
  .search{min-width:240px;flex:1;max-width:360px;}

  .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--panel-2);font-size:12.5px;font-weight:700;text-align:left;
    padding:13px 16px;border-bottom:1px solid var(--border);white-space:nowrap;color:#fff;}
  tbody td{padding:13px 16px;font-size:13.5px;border-bottom:1px solid rgba(174,190,234,.08);vertical-align:middle;}
  tbody tr{transition:.12s;cursor:pointer;}
  tbody tr:hover{background:rgba(36,59,115,.4);}
  tbody tr:last-child td{border-bottom:0;}
  .cust-name{font-weight:700;color:#fff;}
  .cust-sub{color:var(--muted);font-size:12px;}
  .muted{color:var(--muted);}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);}

  .stage-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:5px 10px;border-radius:999px;background:rgba(48,76,254,.16);color:#cdd6ff;border:1px solid rgba(48,76,254,.4);white-space:nowrap;}
  .stage-badge.done{background:rgba(61,214,140,.14);color:#9ff0c6;border-color:rgba(61,214,140,.4);}
  .stage-badge.wait{background:rgba(233,185,73,.14);color:#f4d488;border-color:rgba(233,185,73,.45);}
  .stage-badge.pre{background:rgba(174,190,234,.1);color:var(--muted);border-color:var(--border);}
  .cat-pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;border:1px solid var(--border-strong);color:var(--muted);white-space:nowrap;}

  .row-actions{display:flex;gap:6px;justify-content:flex-end;align-items:center;}
  .pbar{width:90px;height:6px;border-radius:999px;background:rgba(174,190,234,.15);overflow:hidden;}
  .pbar > i{display:block;height:100%;background:var(--brand);border-radius:999px;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(6,11,28,.72);backdrop-filter:blur(3px);
    z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--border-strong);border-radius:18px;
    width:100%;max-width:560px;box-shadow:0 24px 70px rgba(0,0,0,.5);animation:pop .18s ease;}
  .modal.lg{max-width:760px;}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0;}to{transform:none;opacity:1;}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 22px;border-bottom:1px solid var(--border);}
  .modal-head h3{font-size:17px;}
  .modal-head .x{background:none;border:0;color:var(--muted);font-size:22px;line-height:1;padding:4px;}
  .modal-body{padding:22px;}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid .full{grid-column:1 / -1;}
  label.fl{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:6px;}
  .form-grid .field, .modal-body textarea.field{width:100%;}
  textarea.field{resize:vertical;min-height:70px;}

  /* detail */
  .det-head{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:18px;}
  .det-head .meta{display:grid;gap:3px;}
  .det-head .meta .nm{font-size:18px;font-weight:800;}
  .det-head .meta .sub{font-size:13px;color:var(--muted);}
  .det-amount{margin-left:auto;text-align:right;}
  .det-amount .a{font-size:20px;font-weight:800;color:var(--gold);}
  .det-amount .l{font-size:11.5px;color:var(--muted);}

  .det-tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--border);}
  .det-tab{background:none;border:0;color:var(--muted);font-weight:700;font-size:13.5px;padding:9px 4px;border-bottom:2px solid transparent;}
  .det-tab.on{color:#fff;border-bottom-color:var(--brand);}

  .steps{display:grid;gap:8px;}
  .stepitem{display:grid;grid-template-columns:34px 1fr auto;gap:12px;align-items:center;
    background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;}
  .stepitem.sent{border-color:rgba(61,214,140,.4);}
  .stepitem.cur{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand) inset;}
  .stepitem .sn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:14px;background:rgba(174,190,234,.12);color:var(--muted);}
  .stepitem.sent .sn{background:var(--ok);color:#06281a;}
  .stepitem .st-main{min-width:0;}
  .stepitem .st-t{font-size:14px;font-weight:700;}
  .stepitem .st-d{font-size:12px;color:var(--muted);margin-top:1px;}
  .stepitem .st-d .sentat{color:var(--ok);}
  .stepitem .resp-pick{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap;}
  .chipbtn{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:8px;
    border:1px solid var(--border-strong);background:transparent;color:var(--muted);}
  .chipbtn.on{background:var(--brand);border-color:var(--brand);color:#fff;}
  .chipbtn.on.alt{background:var(--gold);border-color:var(--gold);color:#3a2e00;}
  .st-action .btn{min-width:78px;text-align:center;}

  /* 사진 */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
  .photo-grid a{display:block;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--panel-2);}
  .photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
  .photo-grid .cap{font-size:11px;color:var(--muted);padding:6px 8px;}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--border-strong);color:#fff;
    padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:.25s;z-index:200;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:1080px){ .cats{grid-template-columns:repeat(3,1fr);} }
  @media (max-width:820px){
    .stats{grid-template-columns:1fr 1fr;}
    .cats{grid-template-columns:1fr 1fr;}
    .col-partner,.col-amount{display:none;}
    .form-grid{grid-template-columns:1fr;}
  }
  @media (max-width:520px){
    .wrap{padding:16px;} .topbar-in{padding:12px 16px;}
    .cats{grid-template-columns:1fr;}
    .col-phone{display:none;}
    .pbar{display:none;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="logo" id="homeLink"><span class="dot"></span>철거의정석 <small>고객/현장 관리</small></div>
    <div class="spacer"></div>
    <button class="btn ghost sm" onclick="location.href='/photos'">사진함</button>
    <button class="btn ghost sm" onclick="location.href='/upload'">업체 업로드</button>
    <button class="btn primary" id="addBtn">+ 고객/현장 추가</button>
  </div>
</div>

<!-- 메인: 카테고리 보드 -->
<div class="wrap" id="homeView">
  <div class="stats">
    <div class="stat"><div class="lbl">전체 현장</div><div class="val" id="stTotal">0</div></div>
    <div class="stat"><div class="lbl">진행중</div><div class="val" id="stActive">0</div></div>
    <div class="stat wait"><div class="lbl">응답 대기 (④·⑧)</div><div class="val" id="stWait">0</div></div>
    <div class="stat done"><div class="lbl">완료</div><div class="val" id="stDone">0</div></div>
  </div>
  <div class="sec-title">카테고리</div>
  <div class="cats" id="catGrid"></div>
</div>

<!-- 카테고리 상세: 고객/현장 목록(대시보드) -->
<div class="wrap" id="listView" style="display:none;">
  <div class="listhead">
    <button class="btn ghost sm" id="backBtn">← 카테고리</button>
    <div>
      <div class="ht" id="listTitle">카테고리</div>
      <div class="hsub" id="listDesc"></div>
    </div>
    <div class="spacer"></div>
    <span class="muted" id="count" style="font-size:13px;"></span>
  </div>

  <div class="toolbar">
    <input class="field search" id="search" placeholder="고객명·연락처·현장 주소 검색" />
    <select class="field" id="filterStage">
      <option value="">전체 단계</option>
      <option value="pre">접수 전</option>
      <option value="active">진행중</option>
      <option value="wait">응답 대기</option>
      <option value="done">완료</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>고객 / 현장</th>
          <th class="col-phone">연락처</th>
          <th class="col-partner">파트너</th>
          <th>현재 단계</th>
          <th class="col-amount">확정 금액</th>
          <th style="text-align:right;">진행</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none;">이 카테고리에 등록된 현장이 없습니다. <b>+ 고객/현장 추가</b>로 시작하세요.</div>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="formTitle">고객/현장 추가</h3>
      <button class="x" data-close>&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id" />
      <div class="form-grid">
        <div>
          <label class="fl">고객명</label>
          <input class="field" id="f_name" placeholder="예: 김정석" />
        </div>
        <div>
          <label class="fl">호칭</label>
          <select class="field" id="f_title">
            <option value="사장님">사장님</option>
            <option value="고객님">고객님</option>
          </select>
        </div>
        <div>
          <label class="fl">연락처</label>
          <input class="field" id="f_phone" placeholder="010-0000-0000" />
        </div>
        <div>
          <label class="fl">카테고리</label>
          <select class="field" id="f_category"></select>
        </div>
        <div>
          <label class="fl">확정 금액 (원)</label>
          <input class="field" id="f_amount" type="number" placeholder="예: 3500000" />
        </div>
        <div>
          <label class="fl">파트너 업체</label>
          <input class="field" id="f_partner" placeholder="예: ○○건설" />
        </div>
        <div class="full">
          <label class="fl">현장 주소</label>
          <input class="field" id="f_address" placeholder="예: 서울 강남구 ○○로 12" />
        </div>
        <div class="full">
          <label class="fl">메모</label>
          <textarea class="field" id="f_memo" placeholder="특이사항·요청사항"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" data-close>취소</button>
      <button class="btn primary" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="overlay" id="detailOverlay">
  <div class="modal lg">
    <div class="modal-head">
      <h3>현장 진행 관리</h3>
      <button class="x" data-close>&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot">
      <button class="btn danger" id="delBtn">삭제</button>
      <div class="spacer" style="flex:1;"></div>
      <button class="btn ghost" id="editBtn">정보 수정</button>
      <button class="btn primary" data-close>닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== 10단계 정의 ===== */
var STEPS = [
  {n:1, t:"견적 요청 접수", talk:"견적 요청 접수가 완료되었습니다.", resp:null},
  {n:2, t:"상담 예정 안내", talk:"본사 담당자가 금일 중 연락드릴 예정입니다.", resp:null},
  {n:3, t:"현장 방문 예정 안내", talk:"파트너 업체가 현장 방문 예정입니다.", resp:null},
  {n:4, t:"현장 방문 완료 확인", talk:"오늘 파트너 업체가 현장을 방문했나요?", resp:["방문완료","미방문"]},
  {n:5, t:"견적 확정", talk:"확정 금액 안내 · 추가금 0원", resp:null},
  {n:6, t:"공사 일정 확정", talk:"공사 일정이 확정되었습니다.", resp:null},
  {n:7, t:"공사 진행 사진 등록", talk:"진행 사진을 확인하실 수 있습니다.", resp:null},
  {n:8, t:"공사 완료 확인", talk:"진행하신 공사가 마무리 되었나요?", resp:["공사완료","일정변경","문의"]},
  {n:9, t:"공사 완료", talk:"이용해 주셔서 감사합니다.", resp:null},
  {n:10, t:"서비스 평가 요청", talk:"이번 공사는 만족스러우셨나요?", resp:null}
];

/* ===== 카테고리 정의 ===== */
var CATS = [
  {key:"estimate",     t:"견적",          desc:"견적 요청 접수·상담"},
  {key:"bidding",      t:"견적비딩중",    desc:"파트너 업체 견적 비딩"},
  {key:"construction", t:"공사중",        desc:"공사 일정·진행"},
  {key:"done",         t:"완료",          desc:"공사 완료·평가"},
  {key:"closure",      t:"폐업지원금 신청", desc:"폐업 지원금 신청 지원"}
];
function catLabel(key){ var c = CATS.find(function(x){return x.key===key;}); return c?c.t:"미분류"; }

/* ===== 상태 ===== */
var DATA = [];
var ALLPHOTOS = [];
var currentCat = null;
var detailId = null;
var detailTab = "steps";

/* ===== 서버 통신 ===== */
function api(method, url, body){
  return fetch(url, {
    method: method,
    headers: body ? {"Content-Type":"application/json"} : undefined,
    body: body ? JSON.stringify(body) : undefined
  }).then(function(res){
    return res.json().catch(function(){return {};}).then(function(data){
      if(!res.ok) throw new Error(data.error || "서버 오류");
      return data;
    });
  });
}
function loadAll(){
  return Promise.all([
    api("GET","/api/sites").then(function(d){ DATA = d.sites || []; }),
    api("GET","/api/photos").then(function(d){ ALLPHOTOS = d.photos || []; }).catch(function(){ ALLPHOTOS = []; })
  ]);
}
function persist(c){
  return api("PUT","/api/sites/"+c.id, c).catch(function(e){ toast("저장 실패: "+e.message); });
}

/* ===== 유틸 ===== */
function nowStr(){
  var d = new Date();
  var mm = (d.getMonth()+1), dd = d.getDate();
  var hh = String(d.getHours()).padStart(2,"0"), mi = String(d.getMinutes()).padStart(2,"0");
  return mm+"."+dd+" "+hh+":"+mi;
}
function won(v){ if(!v && v!==0) return "-"; return Number(v).toLocaleString("ko-KR")+"원"; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m];}); }
function norm(s){ return String(s||"").trim().toLowerCase().replace(/\s+/g,""); }

/* ===== 상태 계산 ===== */
function sentCount(c){ return c.steps.filter(function(s){return s.sent;}).length; }
function currentStepIndex(c){ var idx=-1; c.steps.forEach(function(s,i){ if(s.sent) idx=i; }); return idx; }
function isDone(c){ return c.steps[9].sent; }
function isWaiting(c){ return (c.steps[3].sent && !c.steps[3].resp) || (c.steps[7].sent && !c.steps[7].resp); }
function statusOf(c){
  if(isDone(c)) return "done";
  if(isWaiting(c)) return "wait";
  if(sentCount(c)===0) return "pre";
  return "active";
}
var circ = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];

/* ===== 사진 매칭 (현장명/업체명/주소 기준) ===== */
function photosForSite(c){
  var keys = [c.name, c.address, c.partner].map(norm).filter(Boolean);
  if(!keys.length) return [];
  return ALLPHOTOS.filter(function(p){
    var hay = [p.site_name, p.company, p.address].map(norm).filter(Boolean);
    return keys.some(function(k){ return hay.some(function(h){ return h.indexOf(k)>=0 || k.indexOf(h)>=0; }); });
  });
}

/* ===== 메인(카테고리 보드) ===== */
function renderHome(){
  document.getElementById("stTotal").textContent = DATA.length;
  document.getElementById("stActive").textContent = DATA.filter(function(c){var s=statusOf(c);return s==="active"||s==="pre";}).length;
  document.getElementById("stWait").textContent = DATA.filter(isWaiting).length;
  document.getElementById("stDone").textContent = DATA.filter(isDone).length;

  var grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  CATS.forEach(function(cat){
    var inCat = DATA.filter(function(c){ return c.category===cat.key; });
    var waiting = inCat.filter(isWaiting).length;
    var btn = document.createElement("button");
    btn.className = "cat c-"+cat.key;
    btn.innerHTML =
      '<span class="bar"></span>'
      +'<div class="ct">'+esc(cat.t)+'</div>'
      +'<div class="cd">'+esc(cat.desc)+'</div>'
      +'<div class="cn">'+inCat.length+'<span style="font-size:14px;color:var(--muted);font-weight:600;"> 건</span></div>'
      +(waiting? '<div class="wait-tag">응답 대기 '+waiting+'</div>' : '<div class="cu">대기 없음</div>');
    btn.onclick = function(){ openCategory(cat.key); };
    grid.appendChild(btn);
  });
}

/* ===== 뷰 전환 ===== */
function goHome(){
  currentCat = null;
  document.getElementById("listView").style.display = "none";
  document.getElementById("homeView").style.display = "block";
  renderHome();
}
function openCategory(key){
  currentCat = key;
  var cat = CATS.find(function(x){return x.key===key;});
  document.getElementById("homeView").style.display = "none";
  document.getElementById("listView").style.display = "block";
  document.getElementById("listTitle").textContent = cat? cat.t : "카테고리";
  document.getElementById("listDesc").textContent = cat? cat.desc : "";
  document.getElementById("search").value = "";
  document.getElementById("filterStage").value = "";
  renderList();
}

/* ===== 목록(대시보드) ===== */
function renderList(){
  var q = document.getElementById("search").value.trim().toLowerCase();
  var fil = document.getElementById("filterStage").value;
  var rows = DATA.filter(function(c){
    if(c.category!==currentCat) return false;
    if(q){
      var hay = (c.name+" "+c.phone+" "+c.address+" "+(c.partner||"")).toLowerCase();
      if(hay.indexOf(q)<0) return false;
    }
    if(fil && statusOf(c)!==fil) return false;
    return true;
  });
  var totalInCat = DATA.filter(function(c){return c.category===currentCat;}).length;

  var tb = document.getElementById("tbody");
  tb.innerHTML = "";
  rows.forEach(function(c){
    var idx = currentStepIndex(c);
    var st = statusOf(c);
    var badgeCls = st==="done"?"done":(st==="wait"?"wait":(st==="pre"?"pre":""));
    var badgeTxt = st==="done" ? "✓ 종료 · 평가요청"
                 : idx<0 ? "접수 전"
                 : circ[idx]+" "+STEPS[idx].t + (st==="wait" ? " · 응답대기" : "");
    var pct = Math.round(sentCount(c)/10*100);
    var pcount = photosForSite(c).length;
    var tr = document.createElement("tr");
    tr.innerHTML =
      '<td><div class="cust-name">'+esc(c.name)+' <span class="muted" style="font-weight:500;">'+esc(c.title)+'</span>'
        +(pcount? ' <span class="cat-pill">📷 '+pcount+'</span>':'')+'</div>'
        +'<div class="cust-sub">'+esc(c.address||"-")+'</div></td>'
      +'<td class="col-phone muted">'+esc(c.phone||"-")+'</td>'
      +'<td class="col-partner muted">'+esc(c.partner||"-")+'</td>'
      +'<td><span class="stage-badge '+badgeCls+'">'+badgeTxt+'</span></td>'
      +'<td class="col-amount" style="font-weight:600;">'+won(c.amount)+'</td>'
      +'<td><div class="row-actions">'
        +'<div class="pbar" title="'+sentCount(c)+'/10"><i style="width:'+pct+'%"></i></div>'
        +'<button class="btn primary sm next-btn" '+(isDone(c)?'disabled style="opacity:.4"':'')+'>다음 ▶</button>'
        +'</div></td>';
    tr.addEventListener("click", function(e){
      if(e.target.closest(".next-btn")) return;
      openDetail(c.id);
    });
    tr.querySelector(".next-btn").addEventListener("click", function(e){
      e.stopPropagation(); advance(c.id);
    });
    tb.appendChild(tr);
  });

  document.getElementById("emptyState").style.display = rows.length? "none":"block";
  document.getElementById("count").textContent = rows.length+"건 표시 / 카테고리 "+totalInCat+"건";
}

/* 변경 후 재렌더(현재 보이는 뷰 기준) */
function rerender(){ if(currentCat) renderList(); else renderHome(); }

/* ===== 다음 단계 발송 ===== */
function advance(id){
  var c = DATA.find(function(x){return x.id===id;});
  if(!c) return;
  var ci = currentStepIndex(c);
  if(ci>=0 && STEPS[ci].resp && !c.steps[ci].resp){
    toast("④/⑧ 응답을 먼저 입력하세요. 현장을 열어 선택해 주세요.");
    openDetail(id); return;
  }
  var next = c.steps.findIndex(function(s){return !s.sent;});
  if(next<0){ toast("이미 모든 단계가 완료됐습니다."); return; }
  c.steps[next].sent = true;
  c.steps[next].at = nowStr();
  persist(c); rerender();
  toast(circ[next]+" "+STEPS[next].t+" 알림톡 발송 처리됨");
  if(document.getElementById("detailOverlay").classList.contains("open")) renderDetail(id);
}

/* ===== 상세 모달 ===== */
function openDetail(id){ detailId=id; detailTab="steps"; renderDetail(id); document.getElementById("detailOverlay").classList.add("open"); }
function renderDetail(id){
  var c = DATA.find(function(x){return x.id===id;});
  if(!c) return;
  var photos = photosForSite(c);
  var body = document.getElementById("detailBody");
  var h = '<div class="det-head">'
    +'<div class="meta"><div class="nm">'+esc(c.name)+' <span class="muted" style="font-size:14px;font-weight:600;">'+esc(c.title)+'</span> '
    +'<span class="cat-pill">'+esc(catLabel(c.category))+'</span></div>'
    +'<div class="sub">'+esc(c.address||"-")+' · '+esc(c.phone||"-")+(c.partner?' · 파트너 '+esc(c.partner):'')+'</div></div>'
    +'<div class="det-amount"><div class="a">'+won(c.amount)+'</div><div class="l">확정 금액 · 추가금 0원</div></div>'
    +'</div>';
  if(c.memo) h += '<div class="muted" style="font-size:13px;margin:-6px 0 16px;">메모 · '+esc(c.memo)+'</div>';

  h += '<div class="det-tabs">'
    +'<button class="det-tab '+(detailTab==="steps"?"on":"")+'" data-tab="steps">진행 단계</button>'
    +'<button class="det-tab '+(detailTab==="photos"?"on":"")+'" data-tab="photos">현장 사진 ('+photos.length+')</button>'
    +'</div>';

  if(detailTab==="steps"){
    h += '<div class="steps">';
    c.steps.forEach(function(s,i){
      var step = STEPS[i];
      var cur = (currentStepIndex(c)===i);
      h += '<div class="stepitem '+(s.sent?"sent":"")+' '+(cur?"cur":"")+'">'
        +'<div class="sn">'+(s.sent?"✓":circ[i])+'</div>'
        +'<div class="st-main"><div class="st-t">'+circ[i]+' '+esc(step.t)+'</div>'
        +'<div class="st-d">'+esc(step.talk)+(s.sent&&s.at?' · <span class="sentat">발송 '+esc(s.at)+'</span>':'')+'</div>';
      if(step.resp && s.sent){
        h += '<div class="resp-pick">';
        step.resp.forEach(function(r,ri){
          var on = s.resp===r;
          var alt = ri>0;
          h += '<button class="chipbtn '+(on?("on"+(alt?" alt":"")):"")+'" data-resp="'+i+'" data-val="'+esc(r)+'">'+esc(r)+'</button>';
        });
        h += '</div>';
        if(s.resp){
          var note = branchNote(i, s.resp);
          if(note) h += '<div class="st-d" style="margin-top:6px;color:var(--gold);">→ '+esc(note)+'</div>';
        }
      }
      h += '</div>';
      h += '<div class="st-action">';
      if(s.sent){ h += '<button class="btn ghost sm" data-unsend="'+i+'">발송취소</button>'; }
      else{ h += '<button class="btn primary sm" data-send="'+i+'">발송</button>'; }
      h += '</div></div>';
    });
    h += '</div>';
  } else {
    if(photos.length===0){
      h += '<div class="empty">아직 등록된 현장 사진이 없습니다.<br><span class="muted" style="font-size:12.5px;">업체가 <b>업체 업로드</b> 페이지에서 같은 현장명·업체명으로 올리면 여기에 표시됩니다.</span></div>';
    } else {
      h += '<div class="photo-grid">';
      photos.forEach(function(p){
        h += '<a href="'+esc(p.url)+'" target="_blank" rel="noopener">'
          +'<img src="'+esc(p.url)+'" alt="'+esc(p.original_name||"현장 사진")+'" loading="lazy" />'
          +'<div class="cap">'+esc(p.site_name||"")+(p.company?' · '+esc(p.company):'')+'</div></a>';
      });
      h += '</div>';
    }
  }
  body.innerHTML = h;

  body.querySelectorAll("[data-tab]").forEach(function(b){
    b.onclick = function(){ detailTab = b.dataset.tab; renderDetail(id); };
  });
  body.querySelectorAll("[data-send]").forEach(function(b){
    b.onclick = function(){ sendStep(c.id, +b.dataset.send); };
  });
  body.querySelectorAll("[data-unsend]").forEach(function(b){
    b.onclick = function(){ unsendStep(c.id, +b.dataset.unsend); };
  });
  body.querySelectorAll("[data-resp]").forEach(function(b){
    b.onclick = function(){ setResp(c.id, +b.dataset.resp, b.dataset.val); };
  });
}
function branchNote(i, r){
  if(i===3){ return r==="미방문" ? "파트너 재배정 → 방문 일정 재안내" : "정상 진행 · 견적 확정 단계로"; }
  if(i===7){
    if(r==="일정변경") return "일정 재설정 → 공사예정으로 회귀";
    if(r==="문의") return "본사 고객센터(1555-6205) 연결";
    return "완료 통지(⑨) → 평가(⑩) 발송";
  }
  return "";
}
function sendStep(id,i){
  var c=DATA.find(function(x){return x.id===id;}); if(!c)return;
  c.steps[i].sent=true; c.steps[i].at=nowStr(); persist(c); rerender(); renderDetail(id);
  toast(circ[i]+" "+STEPS[i].t+" 발송 처리됨");
}
function unsendStep(id,i){
  var c=DATA.find(function(x){return x.id===id;}); if(!c)return;
  c.steps[i].sent=false; c.steps[i].at=null; c.steps[i].resp=null; persist(c); rerender(); renderDetail(id);
}
function setResp(id,i,val){
  var c=DATA.find(function(x){return x.id===id;}); if(!c)return;
  c.steps[i].resp = (c.steps[i].resp===val? null : val);
  persist(c); rerender(); renderDetail(id);
}

/* ===== 추가/수정 ===== */
function fillCategorySelect(sel){
  sel.innerHTML = "";
  CATS.forEach(function(cat){
    var o = document.createElement("option");
    o.value = cat.key; o.textContent = cat.t;
    sel.appendChild(o);
  });
}
function blankSteps(){ return STEPS.map(function(){ return {sent:false, at:null, resp:null}; }); }
function openForm(id){
  var isEdit = !!id;
  document.getElementById("formTitle").textContent = isEdit? "고객/현장 정보 수정":"고객/현장 추가";
  var c = isEdit? DATA.find(function(x){return x.id===id;}) : null;
  document.getElementById("f_id").value = isEdit? id:"";
  document.getElementById("f_name").value = c?c.name:"";
  document.getElementById("f_title").value = c?c.title:"사장님";
  document.getElementById("f_phone").value = c?c.phone:"";
  document.getElementById("f_category").value = c?c.category:(currentCat||"estimate");
  document.getElementById("f_amount").value = c?(c.amount||""):"";
  document.getElementById("f_address").value = c?c.address:"";
  document.getElementById("f_partner").value = c?(c.partner||""):"";
  document.getElementById("f_memo").value = c?(c.memo||""):"";
  document.getElementById("formOverlay").classList.add("open");
  setTimeout(function(){ document.getElementById("f_name").focus(); },50);
}
function saveForm(){
  var name = document.getElementById("f_name").value.trim();
  if(!name){ toast("고객명을 입력하세요."); document.getElementById("f_name").focus(); return; }
  var id = document.getElementById("f_id").value;
  var obj = {
    name:name,
    title:document.getElementById("f_title").value,
    phone:document.getElementById("f_phone").value.trim(),
    category:document.getElementById("f_category").value,
    amount:document.getElementById("f_amount").value? Number(document.getElementById("f_amount").value):null,
    address:document.getElementById("f_address").value.trim(),
    partner:document.getElementById("f_partner").value.trim(),
    memo:document.getElementById("f_memo").value.trim()
  };
  if(id){
    var c = DATA.find(function(x){return x.id===id;});
    obj.steps = c.steps;
    api("PUT","/api/sites/"+id, obj).then(function(d){
      Object.assign(c, d.site);
      rerender();
      document.getElementById("formOverlay").classList.remove("open");
      if(document.getElementById("detailOverlay").classList.contains("open")) renderDetail(id);
      toast("수정되었습니다.");
    }).catch(function(e){ toast("저장 실패: "+e.message); });
  }else{
    obj.steps = blankSteps();
    api("POST","/api/sites", obj).then(function(d){
      DATA.unshift(d.site);
      rerender();
      document.getElementById("formOverlay").classList.remove("open");
      toast("새 현장이 추가되었습니다.");
    }).catch(function(e){ toast("저장 실패: "+e.message); });
  }
}
function delCustomer(id){
  if(!confirm("이 현장을 삭제할까요? 되돌릴 수 없습니다.")) return;
  api("DELETE","/api/sites/"+id).then(function(){
    DATA = DATA.filter(function(x){return x.id!==id;});
    rerender();
    document.getElementById("detailOverlay").classList.remove("open");
    toast("삭제되었습니다.");
  }).catch(function(e){ toast("삭제 실패: "+e.message); });
}

/* ===== 토스트 ===== */
var toastTimer;
function toast(msg){
  var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.classList.remove("show"); },2200);
}

/* ===== 이벤트 ===== */
document.getElementById("homeLink").onclick = goHome;
document.getElementById("backBtn").onclick = goHome;
document.getElementById("addBtn").onclick = function(){ openForm(null); };
document.getElementById("saveBtn").onclick = saveForm;
document.getElementById("search").oninput = renderList;
document.getElementById("filterStage").onchange = renderList;
document.getElementById("editBtn").onclick = function(){ if(detailId) openForm(detailId); };
document.getElementById("delBtn").onclick = function(){ if(detailId) delCustomer(detailId); };
document.querySelectorAll("[data-close]").forEach(function(b){
  b.onclick = function(){ b.closest(".overlay").classList.remove("open"); };
});
document.querySelectorAll(".overlay").forEach(function(o){
  o.addEventListener("click", function(e){ if(e.target===o) o.classList.remove("open"); });
});
document.addEventListener("keydown", function(e){
  if(e.key==="Escape") document.querySelectorAll(".overlay.open").forEach(function(o){o.classList.remove("open");});
});

/* ===== 시작 ===== */
fillCategorySelect(document.getElementById("f_category"));
loadAll().then(function(){
  goHome();
}).catch(function(e){
  toast("데이터를 불러오지 못했습니다: "+e.message);
});
</script>
</body>
</html>
